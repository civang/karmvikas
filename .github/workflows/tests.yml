name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: hr_user
          POSTGRES_PASSWORD: ci_password
          POSTGRES_DB: hr_platform_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hr_user"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      FLASK_ENV: testing
      SECRET_KEY: ci-test-secret-key
      JWT_SECRET_KEY: ci-test-jwt-secret-key
      DATABASE_URL: postgresql://hr_user:ci_password@localhost:5432/hr_platform_test
      TEST_DATABASE_URL: postgresql://hr_user:ci_password@localhost:5432/hr_platform_test
      REDIS_URL: redis://localhost:6379/0
      CORS_ORIGINS: http://localhost:5000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements-dev.txt

      - name: Run test suite with coverage
        working-directory: backend
        run: python -m pytest --cov=app --cov-report=term-missing

      - name: Lint
        working-directory: backend
        run: flake8 app --max-line-length=110 --extend-ignore=E203,W503
        continue-on-error: true
