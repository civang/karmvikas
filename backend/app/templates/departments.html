{% extends "base.html" %}
{% block title %}Departments - Karmvikas HR{% endblock %}
{% block content %}
<div class="row g-4">
  <div class="col-md-6">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h5 class="mb-0">Departments</h5>
      <button class="btn btn-sm btn-primary" data-bs-toggle="modal" data-bs-target="#department-modal">
        <i class="bi bi-plus-lg"></i> Add
      </button>
    </div>
    <div class="card shadow-sm">
      <ul class="list-group list-group-flush" id="departments-list">
        <li class="list-group-item"><div class="skeleton"></div></li>
      </ul>
    </div>
  </div>
  <div class="col-md-6">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h5 class="mb-0">Designations</h5>
      <button class="btn btn-sm btn-primary" data-bs-toggle="modal" data-bs-target="#designation-modal">
        <i class="bi bi-plus-lg"></i> Add
      </button>
    </div>
    <div class="card shadow-sm">
      <ul class="list-group list-group-flush" id="designations-list">
        <li class="list-group-item"><div class="skeleton"></div></li>
      </ul>
    </div>
  </div>
</div>

<div class="modal fade" id="department-modal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header"><h5 class="modal-title">New Department</h5><button class="btn-close" data-bs-dismiss="modal"></button></div>
      <div class="modal-body">
        <form id="department-form">
          <div class="mb-2"><label class="form-label">Name</label><input class="form-control" id="dept-name" required></div>
          <div class="mb-2"><label class="form-label">Description</label><textarea class="form-control" id="dept-description"></textarea></div>
          <button type="submit" class="btn btn-primary">Create</button>
        </form>
      </div>
    </div>
  </div>
</div>

<div class="modal fade" id="designation-modal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header"><h5 class="modal-title">New Designation</h5><button class="btn-close" data-bs-dismiss="modal"></button></div>
      <div class="modal-body">
        <form id="designation-form">
          <div class="mb-2"><label class="form-label">Title</label><input class="form-control" id="desig-title" required></div>
          <div class="mb-2">
            <label class="form-label">Department</label>
            <select class="form-select" id="desig-department" required></select>
          </div>
          <button type="submit" class="btn btn-primary">Create</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script src="{{ url_for('static', filename='js/departments.js') }}"></script>
{% endblock %}
