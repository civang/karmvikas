{% extends "base.html" %}
{% block title %}My Profile - Karmvikas HR{% endblock %}
{% block content %}
<h3 class="mb-4">My Profile</h3>
<div class="row g-4">
<div class="col-md-6">
<div class="card shadow-sm">
  <div class="card-body">
    <form id="profile-form">
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" class="form-control" id="p-email" disabled>
      </div>
      <div class="row">
        <div class="col-md-6 mb-3">
          <label class="form-label">First Name</label>
          <input type="text" class="form-control" id="p-first-name" required>
        </div>
        <div class="col-md-6 mb-3">
          <label class="form-label">Last Name</label>
          <input type="text" class="form-control" id="p-last-name" required>
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label">Phone</label>
        <input type="text" class="form-control" id="p-phone">
      </div>
      <div class="mb-3">
        <label class="form-label">Department</label>
        <input type="text" class="form-control" id="p-department" disabled>
      </div>
      <div class="mb-3">
        <label class="form-label">Designation</label>
        <input type="text" class="form-control" id="p-designation" disabled>
      </div>
      <button type="submit" class="btn btn-primary">Save Changes</button>
    </form>
  </div>
</div>
</div>

<div class="col-md-6">
<div class="card shadow-sm">
  <div class="card-body">
    <h6 class="text-secondary mb-3">My Documents</h6>
    <form id="document-upload-form" class="mb-3">
      <div class="mb-2">
        <select class="form-select" id="document-type">
          <option value="id_proof">ID Proof</option>
          <option value="offer_letter">Offer Letter</option>
          <option value="resume">Resume</option>
          <option value="certificate">Certificate</option>
          <option value="other">Other</option>
        </select>
      </div>
      <div class="mb-2">
        <input type="file" class="form-control" id="document-file" accept=".pdf,.png,.jpg,.jpeg" required>
      </div>
      <button type="submit" class="btn btn-primary w-100">Upload</button>
    </form>
    <small class="text-secondary d-block mb-2">PDF, PNG, or JPG. Max 5MB.</small>
    <ul class="list-group list-group-flush" id="documents-list"></ul>
    <div id="documents-empty" class="empty-state d-none">No documents uploaded yet.</div>
  </div>
</div>
</div>
</div>
{% endblock %}
{% block scripts %}
<script src="{{ url_for('static', filename='js/profile.js') }}"></script>
{% endblock %}
