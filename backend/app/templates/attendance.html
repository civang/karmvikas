{% extends "base.html" %}
{% block title %}Attendance - Karmvikas HR{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
  <h3 class="mb-0">Attendance</h3>
  <div>
    <button class="btn btn-success me-2" id="check-in-btn"><i class="bi bi-box-arrow-in-right me-1"></i>Check In</button>
    <button class="btn btn-outline-secondary" id="check-out-btn"><i class="bi bi-box-arrow-right me-1"></i>Check Out</button>
  </div>
</div>

<div class="card shadow-sm">
  <div class="table-responsive">
    <table class="table align-middle mb-0">
      <thead><tr><th>Date</th><th>Check In</th><th>Check Out</th><th>Status</th></tr></thead>
      <tbody id="attendance-body">
        <tr><td colspan="4"><div class="skeleton"></div></td></tr>
      </tbody>
    </table>
  </div>
  <div id="attendance-empty" class="empty-state d-none">No attendance records yet.</div>
</div>
{% endblock %}
{% block scripts %}
<script src="{{ url_for('static', filename='js/attendance.js') }}"></script>
{% endblock %}
