<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script>document.documentElement.setAttribute("data-bs-theme", localStorage.getItem("theme") || "light");</script>
<title>Forgot Password - Karmvikas HR</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body class="d-flex align-items-center justify-content-center vh-100">
<div class="card shadow-sm" style="width: 380px;">
  <div class="card-body p-4">
    <div class="text-center mb-4">
      <span class="brand-mark d-inline-flex"><i class="bi bi-buildings"></i></span>
      <h4 class="mt-3 mb-0">Forgot your password?</h4>
      <small class="text-secondary">We'll email you a reset link.</small>
    </div>
    <form id="forgot-form">
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" class="form-control" id="email" required autocomplete="username" placeholder="you@company.com">
      </div>
      <button type="submit" class="btn btn-primary w-100" id="submit-btn">
        <span id="spinner" class="spinner-border spinner-border-sm d-none me-1"></span>
        Send Reset Link
      </button>
    </form>
    <div id="success-message" class="alert alert-success mt-3 d-none">
      If an account with that email exists, a reset link has been sent. Check your inbox.
    </div>
    <div class="text-center mt-3">
      <a href="/login" class="small text-decoration-none">Back to sign in</a>
    </div>
  </div>
</div>

<div class="toast-container position-fixed bottom-0 end-0 p-3" id="toast-container"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="{{ url_for('static', filename='js/api.js') }}"></script>
<script src="{{ url_for('static', filename='js/toast.js') }}"></script>
<script src="{{ url_for('static', filename='js/forgot_password.js') }}"></script>
</body>
</html>
