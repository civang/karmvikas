{% extends "base.html" %}
{% block title %}Employees - Karmvikas HR{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
  <h3 class="mb-0">Employees</h3>
</div>

<div class="row g-2 mb-3">
  <div class="col-md-5">
    <input type="text" class="form-control" id="search-input" placeholder="Search by name...">
  </div>
  <div class="col-md-4">
    <select class="form-select" id="department-filter">
      <option value="">All Departments</option>
    </select>
  </div>
</div>

<div class="card shadow-sm">
  <div class="table-responsive">
    <table class="table align-middle mb-0">
      <thead>
        <tr>
          <th>Name</th><th>Email</th><th>Department</th><th>Designation</th><th>Joined</th>
        </tr>
      </thead>
      <tbody id="employees-body">
        <tr><td colspan="5"><div class="skeleton"></div></td></tr>
      </tbody>
    </table>
  </div>
  <div id="employees-empty" class="empty-state d-none">No employees found.</div>
</div>

<nav class="mt-3">
  <ul class="pagination justify-content-center" id="pagination"></ul>
</nav>

<div class="modal fade" id="employee-modal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Employee Profile</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="employee-modal-body"></div>
    </div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script src="{{ url_for('static', filename='js/employees.js') }}"></script>
{% endblock %}
