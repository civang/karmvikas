<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script>document.documentElement.setAttribute("data-bs-theme", localStorage.getItem("theme") || "light");</script>
<title>{% block title %}HR Platform{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body>
<div class="d-flex" id="app-shell">
  <nav class="sidebar d-flex flex-column p-3" id="sidebar">
    <a href="/dashboard" class="d-flex align-items-center gap-2 mb-4 text-decoration-none">
      <span class="brand-mark"><i class="bi bi-buildings"></i></span>
      <span class="fs-6 fw-bold text-body">Karmvikas HR</span>
    </a>
    <ul class="nav nav-pills flex-column mb-auto" id="nav-links">
      <li><a href="/dashboard" class="nav-link" data-page="dashboard"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a></li>
      <li><a href="/employees" class="nav-link" data-page="employees"><i class="bi bi-people me-2"></i>Employees</a></li>
      <li><a href="/attendance" class="nav-link" data-page="attendance"><i class="bi bi-calendar-check me-2"></i>Attendance</a></li>
      <li><a href="/leaves" class="nav-link" data-page="leaves"><i class="bi bi-airplane me-2"></i>Leave</a></li>
      <li><a href="/calendar" class="nav-link" data-page="calendar"><i class="bi bi-calendar-event me-2"></i>Company Calendar</a></li>
      <li><a href="/departments" class="nav-link admin-only" data-page="departments"><i class="bi bi-diagram-3 me-2"></i>Departments</a></li>
      <li><a href="/audit-logs" class="nav-link admin-only" data-page="audit-logs"><i class="bi bi-shield-lock me-2"></i>Audit Logs</a></li>
      <li><a href="/profile" class="nav-link" data-page="profile"><i class="bi bi-person-circle me-2"></i>My Profile</a></li>
    </ul>
    <button class="btn btn-outline-secondary btn-sm" id="theme-toggle"><i class="bi bi-moon-stars me-1"></i>Dark Mode</button>
  </nav>

  <div class="flex-grow-1">
    <header class="topbar d-flex align-items-center justify-content-between px-4 py-2 sticky-top">
      <button class="btn btn-sm btn-outline-secondary d-md-none" id="sidebar-toggle"><i class="bi bi-list"></i></button>
      <div class="ms-auto d-flex align-items-center gap-3">
        <div class="d-flex align-items-center gap-2">
          <span class="avatar-badge" id="user-avatar"></span>
          <div class="d-none d-sm-flex flex-column lh-sm">
            <span id="user-email" class="small fw-medium"></span>
            <span id="user-role" class="text-secondary" style="font-size: 0.72rem; text-transform: capitalize;"></span>
          </div>
        </div>
        <button class="btn btn-sm btn-outline-danger" id="logout-btn"><i class="bi bi-box-arrow-right me-1"></i>Logout</button>
      </div>
    </header>
    <main class="p-4">
      {% block content %}{% endblock %}
    </main>
  </div>
</div>

<div class="toast-container position-fixed bottom-0 end-0 p-3" id="toast-container"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="{{ url_for('static', filename='js/api.js') }}"></script>
<script src="{{ url_for('static', filename='js/toast.js') }}"></script>
<script src="{{ url_for('static', filename='js/theme.js') }}"></script>
<script src="{{ url_for('static', filename='js/layout.js') }}"></script>
{% block scripts %}{% endblock %}
</body>
</html>
