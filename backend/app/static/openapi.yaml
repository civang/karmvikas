openapi: 3.0.3
info:
  title: Karmvikas HR — REST API
  version: "1.0.0"
  description: >
    API-first Human Resource Management System. All endpoints are versioned
    under `/api/v1`. Protected endpoints require a Bearer JWT access token in
    the `Authorization` header. Role-based access control (admin / hr /
    employee) is enforced server-side on every request.
  license:
    name: MIT
servers:
  - url: /api/v1
    description: Current server (relative)

tags:
  - name: Auth
    description: Registration, login, token refresh, logout, password reset
  - name: Employees
    description: Employee directory, self-service profile, soft delete
  - name: Departments
  - name: Designations
  - name: Attendance
  - name: Leave
  - name: Documents
    description: Secure employee document upload/download (IDOR-protected)
  - name: Announcements
  - name: Calendar
  - name: Audit Logs

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >
        Access tokens expire in 15 minutes. Use the refresh token against
        POST /auth/refresh to obtain a new pair. The refresh endpoints expect
        the *refresh* token in the Authorization header.

  responses:
    Unauthorized:
      description: Missing, invalid, expired, or revoked token
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Forbidden:
      description: Authenticated but not permitted (role or ownership check failed)
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    ValidationError:
      description: Request failed validation
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Conflict:
      description: Conflicts with current state (e.g. duplicate, already reviewed)
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }

  schemas:
    Error:
      type: object
      properties:
        error:
          type: object
          properties:
            code: { type: string, example: VALIDATION_ERROR }
            message: { type: string, example: Invalid request data }
            details:
              type: object
              nullable: true
              description: Field-level validation errors, when applicable
    TokenPair:
      type: object
      properties:
        access_token: { type: string }
        refresh_token: { type: string }
    Message:
      type: object
      properties:
        message: { type: string }
    RegisterRequest:
      type: object
      required: [email, password, first_name, last_name, date_joined]
      properties:
        email: { type: string, format: email }
        password:
          type: string
          format: password
          description: Min 8 chars incl. upper, lower, digit, symbol
        first_name: { type: string, maxLength: 100 }
        last_name: { type: string, maxLength: 100 }
        date_joined: { type: string, format: date }
        role: { type: string, enum: [admin, hr, employee], default: employee }
        department_id: { type: integer, nullable: true }
        designation_id: { type: integer, nullable: true }
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string, format: password }
    Employee:
      type: object
      properties:
        id: { type: integer }
        email: { type: string, format: email }
        first_name: { type: string }
        last_name: { type: string }
        phone: { type: string, nullable: true }
        date_joined: { type: string, format: date }
        department_id: { type: integer, nullable: true }
        designation_id: { type: integer, nullable: true }
        department_name: { type: string, nullable: true }
        designation_title: { type: string, nullable: true }
        profile_image_url: { type: string, nullable: true }
    EmployeePage:
      type: object
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/Employee" }
        meta:
          type: object
          properties:
            page: { type: integer }
            per_page: { type: integer }
            total: { type: integer }
            pages: { type: integer }
    Department:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        description: { type: string, nullable: true }
    Designation:
      type: object
      properties:
        id: { type: integer }
        title: { type: string }
        department_id: { type: integer }
    Attendance:
      type: object
      properties:
        id: { type: integer }
        employee_id: { type: integer }
        date: { type: string, format: date }
        check_in: { type: string, format: date-time, nullable: true }
        check_out: { type: string, format: date-time, nullable: true }
        status: { type: string }
    LeaveRequest:
      type: object
      properties:
        id: { type: integer }
        employee_id: { type: integer }
        leave_type: { type: string, enum: [casual, sick, earned, unpaid] }
        start_date: { type: string, format: date }
        end_date: { type: string, format: date }
        status: { type: string, enum: [pending, approved, rejected] }
        reviewed_by: { type: integer, nullable: true }
        comment: { type: string, nullable: true }
    LeaveBalance:
      type: object
      properties:
        leave_type: { type: string }
        total: { type: integer }
        used: { type: integer }
        remaining: { type: integer }
    Document:
      type: object
      properties:
        id: { type: integer }
        employee_id: { type: integer }
        document_type: { type: string, enum: [id_proof, offer_letter, resume, certificate, other] }
        original_filename: { type: string }
        content_type: { type: string }
        file_size: { type: integer }
        uploaded_by: { type: integer }
        created_at: { type: string, format: date-time }
    Announcement:
      type: object
      properties:
        id: { type: integer }
        title: { type: string }
        body: { type: string }
        posted_by: { type: integer }
        created_at: { type: string, format: date-time }
    CalendarEvent:
      type: object
      properties:
        id: { type: integer }
        title: { type: string }
        date: { type: string, format: date }
        event_type: { type: string, enum: [holiday, meeting, deadline, event, other] }
        description: { type: string, nullable: true }
        created_by: { type: integer }
    AuditLog:
      type: object
      properties:
        id: { type: integer }
        user_id: { type: integer, nullable: true }
        action: { type: string }
        entity: { type: string }
        entity_id: { type: integer, nullable: true }
        ip_address: { type: string, nullable: true }
        timestamp: { type: string, format: date-time }

security:
  - bearerAuth: []

paths:
  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new employee (admin/hr only)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RegisterRequest" }
      responses:
        "201": { description: Created }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/ValidationError" }
  /auth/login:
    post:
      tags: [Auth]
      summary: Log in and receive an access + refresh token pair
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LoginRequest" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TokenPair" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "429": { description: Rate limited (5/min) }
  /auth/refresh:
    post:
      tags: [Auth]
      summary: Rotate tokens (send the REFRESH token as Bearer)
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: New token pair; the old refresh token is revoked
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TokenPair" }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /auth/logout:
    post:
      tags: [Auth]
      summary: Revoke the current refresh token (send REFRESH token as Bearer)
      security: [{ bearerAuth: [] }]
      responses:
        "200": { description: Logged out }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /auth/forgot-password:
    post:
      tags: [Auth]
      summary: Request a password-reset email
      description: Always returns 200 regardless of whether the email exists (prevents user enumeration).
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: { type: string, format: email }
      responses:
        "200": { description: Generic acknowledgement }
        "429": { description: Rate limited (3/hour) }
  /auth/reset-password:
    post:
      tags: [Auth]
      summary: Complete a password reset with a single-use token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, new_password]
              properties:
                token: { type: string }
                new_password: { type: string, format: password }
      responses:
        "200": { description: Password changed }
        "422": { $ref: "#/components/responses/ValidationError" }
        "429": { description: Rate limited (5/hour) }

  /employees:
    get:
      tags: [Employees]
      summary: List employees (paginated, searchable, sortable, filterable)
      parameters:
        - { name: page, in: query, schema: { type: integer, default: 1 } }
        - { name: per_page, in: query, schema: { type: integer, default: 20 } }
        - { name: search, in: query, schema: { type: string } }
        - { name: sort, in: query, schema: { type: string }, description: "e.g. first_name or -date_joined" }
        - { name: "filter[department_id]", in: query, schema: { type: integer } }
        - { name: "filter[designation_id]", in: query, schema: { type: integer } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EmployeePage" }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /employees/me:
    get:
      tags: [Employees]
      summary: Get the current user's own employee profile
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Employee" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
  /employees/{employee_id}:
    parameters:
      - { name: employee_id, in: path, required: true, schema: { type: integer } }
    get:
      tags: [Employees]
      summary: Get an employee by id
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Employee" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      tags: [Employees]
      summary: Update an employee
      description: >
        Employees may edit only their own first_name/last_name/phone.
        Admin/HR may edit any employee and any field.
      requestBody:
        content:
          application/json:
            schema: { $ref: "#/components/schemas/Employee" }
      responses:
        "200": { description: Updated }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    delete:
      tags: [Employees]
      summary: Soft-delete an employee (admin/hr only)
      responses:
        "204": { description: Deleted }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /departments:
    get:
      tags: [Departments]
      summary: List departments
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/Department" } }
    post:
      tags: [Departments]
      summary: Create a department (admin/hr only)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/Department" }
      responses:
        "201": { description: Created }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Conflict" }
  /departments/{department_id}:
    parameters:
      - { name: department_id, in: path, required: true, schema: { type: integer } }
    get:
      tags: [Departments]
      summary: Get a department
      responses:
        "200": { description: OK }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      tags: [Departments]
      summary: Update a department (admin/hr only)
      responses:
        "200": { description: Updated }
        "403": { $ref: "#/components/responses/Forbidden" }
    delete:
      tags: [Departments]
      summary: Delete a department (admin/hr only)
      responses:
        "204": { description: Deleted }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Conflict" }

  /designations:
    get:
      tags: [Designations]
      summary: List designations
      parameters:
        - { name: department_id, in: query, schema: { type: integer } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/Designation" } }
    post:
      tags: [Designations]
      summary: Create a designation (admin/hr only)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/Designation" }
      responses:
        "201": { description: Created }
        "403": { $ref: "#/components/responses/Forbidden" }
  /designations/{designation_id}:
    parameters:
      - { name: designation_id, in: path, required: true, schema: { type: integer } }
    get:
      tags: [Designations]
      summary: Get a designation
      responses:
        "200": { description: OK }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      tags: [Designations]
      summary: Update a designation (admin/hr only)
      responses:
        "200": { description: Updated }
        "403": { $ref: "#/components/responses/Forbidden" }
    delete:
      tags: [Designations]
      summary: Delete a designation (admin/hr only)
      responses:
        "204": { description: Deleted }
        "403": { $ref: "#/components/responses/Forbidden" }

  /attendance/check-in:
    post:
      tags: [Attendance]
      summary: Check in for today
      responses:
        "201":
          description: Checked in
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Attendance" }
        "409": { $ref: "#/components/responses/Conflict" }
  /attendance/check-out:
    post:
      tags: [Attendance]
      summary: Check out for today
      responses:
        "200": { description: Checked out }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/ValidationError" }
  /attendance:
    get:
      tags: [Attendance]
      summary: List attendance records
      description: Employees see only their own; admin/hr may pass employee_id.
      parameters:
        - { name: employee_id, in: query, schema: { type: integer } }
        - { name: from, in: query, schema: { type: string, format: date } }
        - { name: to, in: query, schema: { type: string, format: date } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/Attendance" } }
        "403": { $ref: "#/components/responses/Forbidden" }

  /leaves:
    post:
      tags: [Leave]
      summary: Apply for leave
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [leave_type, start_date, end_date]
              properties:
                leave_type: { type: string, enum: [casual, sick, earned, unpaid] }
                start_date: { type: string, format: date }
                end_date: { type: string, format: date }
      responses:
        "201":
          description: Created (pending)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LeaveRequest" }
    get:
      tags: [Leave]
      summary: List leave requests
      parameters:
        - { name: status, in: query, schema: { type: string, enum: [pending, approved, rejected] } }
        - { name: employee_id, in: query, schema: { type: integer } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/LeaveRequest" } }
        "403": { $ref: "#/components/responses/Forbidden" }
  /leaves/balances:
    get:
      tags: [Leave]
      summary: Get the current user's leave balances
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/LeaveBalance" } }
  /leaves/{leave_id}/approve:
    parameters:
      - { name: leave_id, in: path, required: true, schema: { type: integer } }
    patch:
      tags: [Leave]
      summary: Approve a leave request (admin/hr only)
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties: { comment: { type: string } }
      responses:
        "200": { description: Approved }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Conflict" }
  /leaves/{leave_id}/reject:
    parameters:
      - { name: leave_id, in: path, required: true, schema: { type: integer } }
    patch:
      tags: [Leave]
      summary: Reject a leave request (admin/hr only)
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties: { comment: { type: string } }
      responses:
        "200": { description: Rejected }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Conflict" }

  /employees/{employee_id}/documents:
    parameters:
      - { name: employee_id, in: path, required: true, schema: { type: integer } }
    post:
      tags: [Documents]
      summary: Upload a document (self, or admin/hr for anyone)
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file: { type: string, format: binary }
                document_type: { type: string, enum: [id_proof, offer_letter, resume, certificate, other] }
      responses:
        "201":
          description: Uploaded
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Document" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/ValidationError" }
    get:
      tags: [Documents]
      summary: List an employee's documents (self, or admin/hr)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/Document" } }
        "403": { $ref: "#/components/responses/Forbidden" }
  /documents/{document_id}/download:
    parameters:
      - { name: document_id, in: path, required: true, schema: { type: integer } }
    get:
      tags: [Documents]
      summary: Download a document (IDOR-protected)
      responses:
        "200": { description: Binary file attachment }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
  /documents/{document_id}:
    parameters:
      - { name: document_id, in: path, required: true, schema: { type: integer } }
    delete:
      tags: [Documents]
      summary: Delete a document (owner, or admin/hr)
      responses:
        "204": { description: Deleted }
        "403": { $ref: "#/components/responses/Forbidden" }

  /announcements:
    get:
      tags: [Announcements]
      summary: List announcements
      parameters:
        - { name: limit, in: query, schema: { type: integer, default: 10 } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/Announcement" } }
    post:
      tags: [Announcements]
      summary: Post an announcement (admin/hr only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, body]
              properties:
                title: { type: string }
                body: { type: string }
      responses:
        "201": { description: Created }
        "403": { $ref: "#/components/responses/Forbidden" }
  /announcements/{announcement_id}:
    parameters:
      - { name: announcement_id, in: path, required: true, schema: { type: integer } }
    delete:
      tags: [Announcements]
      summary: Delete an announcement (admin/hr only)
      responses:
        "204": { description: Deleted }
        "403": { $ref: "#/components/responses/Forbidden" }

  /calendar-events:
    get:
      tags: [Calendar]
      summary: List calendar events
      parameters:
        - { name: from, in: query, schema: { type: string, format: date } }
        - { name: to, in: query, schema: { type: string, format: date } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/CalendarEvent" } }
    post:
      tags: [Calendar]
      summary: Create a calendar event (admin/hr only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, date]
              properties:
                title: { type: string }
                date: { type: string, format: date }
                event_type: { type: string, enum: [holiday, meeting, deadline, event, other] }
                description: { type: string }
      responses:
        "201": { description: Created }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Conflict" }
  /calendar-events/{event_id}:
    parameters:
      - { name: event_id, in: path, required: true, schema: { type: integer } }
    delete:
      tags: [Calendar]
      summary: Delete a calendar event (admin/hr only)
      responses:
        "204": { description: Deleted }
        "403": { $ref: "#/components/responses/Forbidden" }

  /audit-logs:
    get:
      tags: [Audit Logs]
      summary: List audit log entries (admin only)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/AuditLog" } }
        "403": { $ref: "#/components/responses/Forbidden" }
